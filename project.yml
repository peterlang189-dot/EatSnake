name: WordWise
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
packages:
  WordWisePackage:
    path: .
targets:
  WordWiseApp:
    type: application
    platform: iOS
    sources:
      - App/WordWiseApp
    dependencies:
      - package: WordWisePackage
        product: WordWiseCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.wordwise
        INFOPLIST_KEY_CFBundleDisplayName: WordWise
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
  WordWiseAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - App/WordWiseAppUITests
    dependencies:
      - target: WordWiseApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.wordwise.uitests
        TEST_TARGET_NAME: WordWiseApp
